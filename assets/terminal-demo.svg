<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .btn-close { fill: #f38ba8; }
    .btn-min { fill: #f9e2af; }
    .btn-max { fill: #a6e3a1; }
    .title { fill: #cdd6f4; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; font-size: 13px; }
    .prompt { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .cmd { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .info { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .success { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .warn { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .white { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
    .separator { fill: #585b70; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 13px; }
  </style>

  <!-- Window frame -->
  <rect class="bg" width="800" height="520" rx="10" ry="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="800" height="36" rx="10" ry="10"/>
  <rect class="titlebar" y="20" width="800" height="16"/>

  <!-- Traffic lights -->
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>

  <!-- Title -->
  <text class="title" x="400" y="23" text-anchor="middle">Terminal — claudux</text>

  <!-- Terminal content -->
  <g transform="translate(20, 56)">
    <!-- Line 1: command -->
    <text class="prompt" y="0">$</text>
    <text class="cmd" x="16" y="0">claudux update</text>

    <!-- Line 2: blank -->

    <!-- Line 3: header -->
    <text class="white" y="36">📚 claudux - my-project Documentation</text>

    <!-- Line 4: subheader -->
    <text class="dim" y="54">Powered by Claude AI - Local CLI orchestration</text>

    <!-- Line 5: blank -->

    <!-- Line 6 -->
    <text class="info" y="90">📊 Starting documentation update and cleanup...</text>

    <!-- Line 7 -->
    <text class="info" y="108">🚀 Generating documentation...</text>

    <!-- Line 8 -->
    <text class="info" y="126">🧠 Model: Claude Sonnet (fast &amp; capable)</text>

    <!-- Line 9 -->
    <text class="info" y="144">📝 Building prompt for javascript project...</text>

    <!-- Line 10 -->
    <text class="success" y="162">✅ Prompt built successfully (4218 chars)</text>

    <!-- Line 11: blank -->

    <!-- Line 12 -->
    <text class="info" y="198">🚀 Starting documentation generation...</text>

    <!-- Line 13: separator -->
    <text class="separator" y="216">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

    <!-- Line 14-18: file operations -->
    <text class="success" y="252">✅ Created docs/guide/index.md</text>
    <text class="success" y="270">✅ Created docs/guide/installation.md</text>
    <text class="success" y="288">✅ Created docs/api/index.md</text>
    <text class="success" y="306">✅ Created docs/features/index.md</text>
    <text class="success" y="324">✅ Updated docs/.vitepress/config.ts</text>

    <!-- Line 19: separator -->
    <text class="separator" y="342">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

    <!-- Line 20 -->
    <text class="success" y="378">Documentation update complete!</text>

    <!-- Line 21 -->
    <text class="info" y="396">🔍 Validating documentation links...</text>

    <!-- Line 22 -->
    <text class="success" y="414">✅ All links are valid! (14/14)</text>

    <!-- Line 23: blank -->

    <!-- Line 24: next prompt -->
    <text class="prompt" y="450">$</text>
    <text class="dim" x="16" y="450">▌</text>
  </g>
</svg>
